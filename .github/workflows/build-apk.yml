name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dito natin sinasabi sa Java at Flutter na nasa loob ng subfolder ang iyong app
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Idagdag muna natin ang launcher icons package para magka-icon ang app gamit ang logo mo
      - name: Install and Setup Icons
        working-directory: id_photo_editor # Pinipilit nitong pumasok sa tamang folder
        run: |
          flutter pub add dev:flutter_launcher_icons
          
          # Gumawa ng pansamantalang configuration para sa icon
          echo "flutter_launcher_icons:" > flutter_launcher_icons.yaml
          echo "  android: true" >> flutter_launcher_icons.yaml
          echo "  ios: true" >> flutter_launcher_icons.yaml
          echo "  image_path: \"assets/icon/app_logo.png\"" >> flutter_launcher_icons.yaml
          
          flutter pub get
          flutter pub run flutter_launcher_icons

      # Dito na magbi-build ang APK nang walang error sa path
      - name: Build APK
        working-directory: id_photo_editor
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-release
          path: id_photo_editor/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
