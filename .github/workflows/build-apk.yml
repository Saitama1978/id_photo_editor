name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java env
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Setup Flutter env
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Dito i-se-setup ang icon mo mula sa root directory
      - name: Install and Setup Icons
        run: |
          flutter pub add dev:flutter_launcher_icons
          
          # Paggawa ng launcher icons config file
          echo "flutter_launcher_icons:" > flutter_launcher_icons.yaml
          echo "  android: true" >> flutter_launcher_icons.yaml
          echo "  ios: true" >> flutter_launcher_icons.yaml
          echo "  image_path: \"assets/icon/app_logo.png\"" >> flutter_launcher_icons.yaml
          
          flutter pub get
          flutter pub run flutter_launcher_icons

      # Pag-build ng APK mula sa root directory
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # Pag-upload ng natapos na APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-release
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
