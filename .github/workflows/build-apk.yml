name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup Java Environment
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Setup Flutter Environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. I-repair ang Android project structure
      - name: Repair and Generate Android Files
        run: |
          flutter create --platforms=android .
          flutter pub get

      # 4. Awtomatikong i-bake ang logo mula sa ROOT folder bilang launcher icon
      - name: Inject Launcher Icon
        run: |
          flutter pub add dev:flutter_launcher_icons
          
          echo "flutter_launcher_icons:" > flutter_launcher_icons.yaml
          echo "  android: true" >> flutter_launcher_icons.yaml
          echo "  ios: true" >> flutter_launcher_icons.yaml
          echo "  image_path: \"app_logo.png\"" >> flutter_launcher_icons.yaml
          
          flutter pub get
          flutter pub run flutter_launcher_icons

      # 5. Pag-build ng APK (Kumpleto na kasama ang Icon at Developer settings)
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 6. Pag-upload ng natapos na APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-release
          path: "**/build/app/outputs/flutter-apk/*.apk"
          retention-days: 7
