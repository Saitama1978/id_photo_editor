name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java env
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Setup Flutter env
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # I-download ang dependencies nang malinis
      - name: Install dependencies
        run: flutter pub get

      # Pag-build ng APK (Tinanggal muna ang automatic icon setup para umiwas sa error)
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # Pag-upload ng natapos na APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-release
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
