name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup Java Environment
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Setup Flutter Environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. I-download ang dependencies sa tamang folder
      - name: Install dependencies
        working-directory: id_photo_editor
        run: flutter pub get

      # 4. I-build ang APK gamit ang tamang folder path
      - name: Build APK
        working-directory: id_photo_editor
        run: flutter build apk --release --split-per-abi

      # 5. I-upload ang nagawang APK mula sa tamang lokasyon
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-release
          path: id_photo_editor/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
